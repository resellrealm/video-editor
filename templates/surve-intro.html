<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ app_name }} Intro</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 1080px;
      height: 1920px;
      background-color: #1E1B4B;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      overflow: hidden;
    }

    /* Subtle radial glow behind the main content */
    .glow {
      position: absolute;
      width: 900px;
      height: 900px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.25) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .container {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 44px;
      padding: 80px;
      text-align: center;
      z-index: 1;
    }

    .icon-wrap {
      width: 160px;
      height: 160px;
      background: linear-gradient(135deg, #7C3AED, #A855F7);
      border-radius: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      box-shadow: 0 0 60px rgba(139, 92, 246, 0.5);
    }

    .icon-wrap svg {
      width: 88px;
      height: 88px;
      fill: #FDE68A;
    }

    .app-name {
      font-size: 128px;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: -3px;
      line-height: 1;
    }

    .app-name span {
      color: #A78BFA;
    }

    .accent-bar {
      width: 140px;
      height: 6px;
      background: linear-gradient(90deg, #7C3AED, #FDE68A);
      border-radius: 3px;
    }

    .tagline {
      font-size: 48px;
      font-weight: 400;
      color: #C4B5FD;
      letter-spacing: 0.5px;
      line-height: 1.4;
      max-width: 820px;
    }

    .pill {
      background-color: rgba(124, 58, 237, 0.3);
      border: 2px solid #7C3AED;
      border-radius: 100px;
      padding: 18px 56px;
      font-size: 34px;
      font-weight: 600;
      color: #FDE68A;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="glow"></div>

  <div class="container">
    <div class="icon-wrap">
      <!-- Survey / checklist icon -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-9 14l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
      </svg>
    </div>

    <div class="app-name">{{ app_name }}</div>

    <div class="accent-bar"></div>

    <div class="tagline">{{ tagline }}</div>

    <div class="pill">Quick &amp; Easy</div>
  </div>
</body>
</html>
