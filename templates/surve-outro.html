<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ app_name }} Outro</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 1080px;
      height: 1920px;
      background-color: #1E1B4B;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      overflow: hidden;
    }

    .glow {
      position: absolute;
      width: 900px;
      height: 900px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.2) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .container {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 56px;
      padding: 80px;
      text-align: center;
      z-index: 1;
    }

    .app-name {
      font-size: 96px;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: -2px;
      line-height: 1;
    }

    .headline {
      font-size: 64px;
      font-weight: 700;
      color: #EDE9FE;
      line-height: 1.25;
      max-width: 860px;
    }

    .headline span {
      color: #FDE68A;
    }

    .reward-block {
      background: linear-gradient(135deg, rgba(124, 58, 237, 0.4), rgba(109, 40, 217, 0.6));
      border: 2px solid rgba(167, 139, 250, 0.4);
      border-radius: 32px;
      padding: 60px 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      width: 860px;
    }

    .reward-label {
      font-size: 32px;
      font-weight: 500;
      color: #C4B5FD;
      text-transform: uppercase;
      letter-spacing: 3px;
    }

    .cta-text {
      font-size: 56px;
      font-weight: 700;
      color: #FDE68A;
      line-height: 1.2;
    }

    .accent-bar {
      width: 120px;
      height: 6px;
      background: linear-gradient(90deg, #7C3AED, #FDE68A);
      border-radius: 3px;
    }

    .cta-button {
      background: linear-gradient(135deg, #7C3AED, #9333EA);
      border-radius: 100px;
      padding: 36px 100px;
      font-size: 42px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 0.5px;
      box-shadow: 0 8px 40px rgba(124, 58, 237, 0.5);
    }

    .sub-text {
      font-size: 32px;
      color: #6B7280;
    }
  </style>
</head>
<body>
  <div class="glow"></div>

  <div class="container">
    <div class="app-name">{{ app_name }}</div>

    <div class="accent-bar"></div>

    <div class="headline">
      <span>Quick Surveys.</span><br />Real Rewards.
    </div>

    <div class="reward-block">
      <div class="reward-label">Start earning today</div>
      <div class="cta-text">{{ cta_text }}</div>
    </div>

    <div class="cta-button">Get Started Free</div>

    <div class="sub-text">Available on iOS &amp; Android</div>
  </div>
</body>
</html>
